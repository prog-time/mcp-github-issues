name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: |
          LINT_DIRS=("src/" "tests/")

          echo "ℹ️ Running ESLint on: ${LINT_DIRS[*]}"

          if npx eslint "${LINT_DIRS[@]}" --fix; then
            echo "✅ ESLint passed!"
          else
            echo "❌ ESLint found issues!"
            exit 1
          fi

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          TEST_RUNNER="vitest"

          echo "ℹ️ Running tests via $TEST_RUNNER..."

          if npx "$TEST_RUNNER" run; then
            echo "✅ All tests passed!"
          else
            echo "❌ Tests failed!"
            exit 1
          fi

  tsc:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: |
          TS_CONFIG="tsconfig.check.json"

          if [ ! -f "$TS_CONFIG" ]; then
            echo "::error::Config file $TS_CONFIG not found"
            exit 1
          fi

          echo "ℹ️ Running type check with $TS_CONFIG..."

          if npx tsc --project "$TS_CONFIG"; then
            echo "✅ TypeScript check passed!"
          else
            echo "❌ TypeScript check failed!"
            exit 1
          fi
